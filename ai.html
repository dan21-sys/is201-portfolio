<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retro Soccer Game</title>

<style>
body {
    background: #111;
    text-align: center;
    color: white;
    font-family: monospace;
}

/* BACK LINK STYLE */
.home-link {
    display: inline-block;
    margin-top: 10px;
    color: white;
    text-decoration: none;
    font-size: 16px;
}

.home-link:hover {
    color: #00ff88;
}

canvas {
    background: #2ecc71;
    border: 4px solid white;
    margin-top: 20px;
}

/* Reset button styling */
button {
    margin-top: 10px;
    padding: 10px 20px;
    font-family: monospace;
    font-size: 16px;
    background: #00ff88;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #00cc66;
}
</style>
</head>

<body>

<!-- ✅ BACK TO HOME LINK -->
<a href="index.html" class="home-link">⬅ Back to Home</a>

<h1>⚽ Retro Soccer ⚽</h1>
<p>First to 3 goals wins!</p>

<canvas id="game" width="700" height="400"></canvas>

<br>
<button onclick="resetPositions()">Reset Play</button>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let player = { x: 100, y: 200, vx: 0, vy: 0, size: 20 };
let enemy = { x: 550, y: 200, size: 20 };
let ball = { x: 350, y: 200, vx: 0, vy: 0, size: 10 };

let playerScore = 0;
let enemyScore = 0;
let gameOver = false;
let resultText = "";

let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (gameOver && e.key.toLowerCase() === "r") {
        restart();
    }
});

document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
    if (gameOver) return;

    if (keys["ArrowUp"]) player.vy -= 0.3;
    if (keys["ArrowDown"]) player.vy += 0.3;
    if (keys["ArrowLeft"]) player.vx -= 0.3;
    if (keys["ArrowRight"]) player.vx += 0.3;

    player.x += player.vx;
    player.y += player.vy;

    player.vx *= 0.9;
    player.vy *= 0.9;

    player.x = Math.max(0, Math.min(c.width - player.size, player.x));
    player.y = Math.max(0, Math.min(c.height - (player.size + 10), player.y));

    if (enemy.y < ball.y) enemy.y += 1.5;
    if (enemy.y > ball.y) enemy.y -= 1.5;

    enemy.x = Math.max(0, Math.min(c.width - enemy.size, enemy.x));
    enemy.y = Math.max(0, Math.min(c.height - (enemy.size + 10), enemy.y));

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.97;
    ball.vy *= 0.97;

    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 30) {
        ball.vx += dx * 0.25;
        ball.vy += dy * 0.25;
    }

    let edx = ball.x - enemy.x;
    let edy = ball.y - enemy.y;
    let edist = Math.sqrt(edx*edx + edy*edy);

    if (edist < 30) {
        ball.vx -= 4;
    }

    if (ball.y <= 0 || ball.y >= c.height) {
        ball.vy *= -1;
    }

    if (ball.x <= 0) {
        if (ball.y < 150 || ball.y > 250) ball.vx *= -1;
    }

    if (ball.x >= c.width) {
        if (ball.y < 150 || ball.y > 250) ball.vx *= -1;
    }

    if (ball.x > 690 && ball.y > 150 && ball.y < 250) {
        playerScore++;
        checkWin();
        reset();
    }

    if (ball.x < 10 && ball.y > 150 && ball.y < 250) {
        enemyScore++;
        checkWin();
        reset();
    }
}

function checkWin() {
    if (playerScore >= 3) {
        gameOver = true;
        resultText = "🏆 YOU WON!";
    }

    if (enemyScore >= 3) {
        gameOver = true;
        resultText = "❌ YOU LOST!";
    }
}

function restart() {
    playerScore = 0;
    enemyScore = 0;
    gameOver = false;
    resultText = "";
    reset();
}

function reset() {
    ball.x = 350;
    ball.y = 200;
    ball.vx = 0;
    ball.vy = 0;

    player.x = 100;
    player.y = 200;
    player.vx = 0;
    player.vy = 0;

    enemy.x = 550;
    enemy.y = 200;
}

function resetPositions() {
    reset();
}

function drawPlayer() {
    let s = player.size;

    ctx.fillStyle = "blue";
    ctx.fillRect(player.x, player.y + s * 0.3, s, s);

    ctx.fillStyle = "#ffcc99";
    ctx.fillRect(player.x + s * 0.25, player.y, s * 0.5, s * 0.3);

    ctx.fillStyle = "black";
    ctx.fillRect(player.x + s * 0.2, player.y + s + 2, s * 0.2, 6);
    ctx.fillRect(player.x + s * 0.6, player.y + s + 2, s * 0.2, 6);
}

function drawEnemy() {
    let s = enemy.size;

    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y + s * 0.3, s, s);

    ctx.fillStyle = "#ffcc99";
    ctx.fillRect(enemy.x + s * 0.25, enemy.y, s * 0.5, s * 0.3);

    ctx.fillStyle = "black";
    ctx.fillRect(enemy.x + s * 0.2, enemy.y + s + 2, s * 0.2, 6);
    ctx.fillRect(enemy.x + s * 0.6, enemy.y + s + 2, s * 0.2, 6);
}

function drawBall() {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
    ctx.fill();
}

function drawField() {
    ctx.strokeStyle = "white";

    ctx.beginPath();
    ctx.moveTo(350, 0);
    ctx.lineTo(350, 400);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(350, 200, 40, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = "white";
    ctx.fillRect(0, 150, 10, 100);
    ctx.fillRect(690, 150, 10, 100);
}

function drawScore() {
    ctx.fillStyle = "white";
    ctx.font = "24px monospace";
    ctx.fillText(playerScore + " - " + enemyScore, 320, 30);
}

function drawGameOver() {
    if (!gameOver) return;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, c.width, c.height);

    ctx.fillStyle = "white";
    ctx.font = "40px monospace";
    ctx.fillText(resultText, 200, 180);

    ctx.font = "20px monospace";
    ctx.fillText("Press R to Play Again", 210, 230);
}

function draw() {
    ctx.clearRect(0,0,c.width,c.height);

    drawField();
    drawPlayer();
    drawEnemy();
    drawBall();
    drawScore();
    drawGameOver();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
